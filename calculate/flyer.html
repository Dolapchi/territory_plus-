<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Флаер А5 — Покос травы</title>
    <style>
        /* ----- Общие сбросы и настройка печати ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e0e0e0; /* Серый фон, чтобы видеть границы флаера на экране */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Montserrat', 'Segoe UI', Roboto, Arial, sans-serif;
        }

        /* ----- Сам флаер (формат А5) ----- */
        .flyer {
            width: 148mm;  /* Ширина А5 */
            height: 210mm; /* Высота А5 */
            background: #ffffff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            padding: 12mm 10mm; /* Внутренние отступы */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            border: 1px solid #ccc; /* Для наглядности на экране */
        }

        /* ----- Декоративные акценты (экономим краску) ----- */
        .accent-block {
            position: absolute;
            top: -40px;
            right: -40px;
            width: 160px;
            height: 160px;
            background: #f0f7ee; /* Очень светлый зелёный (почти не расходует краску) */
            border-radius: 50%;
            z-index: 0;
        }

        .accent-block-bottom {
            position: absolute;
            bottom: -60px;
            left: -60px;
            width: 200px;
            height: 200px;
            background: #f0f7ee;
            border-radius: 50%;
            z-index: 0;
        }

        /* ----- Верхняя часть (логотип и скидка) ----- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 1;
            position: relative;
        }

        .brand {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #1a3b1a;
            line-height: 1.2;
        }
        .brand span {
            font-weight: 300;
            color: #4a7c4a;
        }

        .badge {
            background: #e63946; /* Яркий красный, но только в одном месте */
            color: #fff;
            font-weight: 800;
            font-size: 22px;
            padding: 6px 18px;
            border-radius: 40px;
            box-shadow: 0 4px 10px rgba(230, 57, 70, 0.2);
            white-space: nowrap;
            transform: rotate(2deg);
        }
        .badge small {
            font-size: 14px;
            font-weight: 400;
            display: block;
            margin-top: -4px;
        }

        /* ----- Главный заголовок ----- */
        .main-title {
            z-index: 1;
            margin-top: 10px;
        }
        .main-title h1 {
            font-size: 38px;
            font-weight: 800;
            color: #1a3b1a;
            line-height: 1.1;
        }
        .main-title h1 .highlight {
            background: #f4a261; /* Тёплый акцент, экономит краску лучше сплошного фона */
            padding: 0 8px;
            display: inline-block;
            color: #1a3b1a;
        }
        .main-title .sub {
            font-size: 18px;
            font-weight: 400;
            color: #2d4a2d;
            margin-top: 6px;
            letter-spacing: 0.3px;
        }

        /* ----- Список преимуществ (иконки экономные) ----- */
        .features {
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin: 10px 0 6px 0;
        }
        .feature-item {
            font-size: 14px;
            color: #1e3a1e;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .feature-item .icon {
            display: inline-block;
            width: 18px;
            height: 18px;
            background: #d4e8d4;
            border-radius: 50%;
            text-align: center;
            line-height: 18px;
            font-weight: 700;
            color: #1a3b1a;
            flex-shrink: 0;
        }

        /* ----- Блок скидки и призыва ----- */
        .cta-block {
            z-index: 1;
            background: #f8faf6; /* Почти белый, минимальный расход краски */
            border-left: 6px solid #e63946;
            padding: 12px 16px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin: 8px 0;
        }
        .cta-block .big-discount {
            font-size: 28px;
            font-weight: 800;
            color: #1a3b1a;
        }
        .cta-block .big-discount span {
            color: #e63946;
            background: #fff5f5;
            padding: 0 10px;
            border-radius: 30px;
        }
        .cta-block .desc {
            font-size: 14px;
            color: #2d4a2d;
        }

        /* ----- Нижняя часть (телефон) ----- */
        .footer {
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #e0ebe0;
            padding-top: 12px;
            margin-top: 4px;
        }
        .phone {
            font-size: 26px;
            font-weight: 700;
            color: #1a3b1a;
            letter-spacing: 0.5px;
            text-decoration: none;
        }
        .phone small {
            font-weight: 400;
            font-size: 14px;
            color: #4a7c4a;
        }
        .action-text {
            font-size: 13px;
            color: #4a7c4a;
            font-weight: 500;
            border: 1px solid #c0d6c0;
            padding: 6px 14px;
            border-radius: 30px;
            background: #fafffa;
        }

        /* ----- Правила для печати (невидимые на экране) ----- */
        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
                min-height: auto;
            }
            .flyer {
                box-shadow: none;
                border: none;
                width: 100%;
                height: 100%;
                padding: 8mm 8mm;
                border-radius: 0;
            }
            .accent-block,
            .accent-block-bottom {
                opacity: 0.6; /* Чуть бледнее для экономии тонера */
            }
        }

        /* ----- Адаптация для экрана (чтобы было видно как на А5) ----- */
        @media screen and (max-width: 600px) {
            .flyer {
                width: 100%;
                height: auto;
                min-height: 100vh;
                border-radius: 0;
                padding: 20px;
            }
            .main-title h1 {
                font-size: 28px;
            }
            .badge {
                font-size: 18px;
                padding: 4px 14px;
            }
            .phone {
                font-size: 20px;
            }
            .cta-block .big-discount {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="flyer">

        <!-- Фоновые пятна (для лёгкого дизайна) -->
        <div class="accent-block"></div>
        <div class="accent-block-bottom"></div>

        <!-- Шапка: бренд + скидка -->
        <div class="header">
            <div class="brand">
                Территория<br><span>Плюс</span>
            </div>
            <div class="badge">
                −20% <small>на первое обращение</small>
            </div>
        </div>

        <!-- Главный заголовок -->
        <div class="main-title">
            <h1>
                Покос травы<br>
                <span class="highlight">быстро и аккуратно</span>
            </h1>
            <div class="sub">Опытные специалисты со своей техникой</div>
        </div>

        <!-- Преимущества -->
        <div class="features">
            <div class="feature-item">
                <span class="icon">✓</span> Без задержек и переносов
            </div>
            <div class="feature-item">
                <span class="icon">✓</span> Своя техника — выезд в день звонка
            </div>
            <div class="feature-item">
                <span class="icon">✓</span> Работаем в КМВ и области
            </div>
        </div>

        <!-- Блок со скидкой -->
        <div class="cta-block">
            <div class="big-discount">
                <span>Скидка 20%</span> в июле
            </div>
            <div class="desc">
                На первое обращение при заказе от 1 сотки
            </div>
        </div>

        <!-- Нижняя часть: телефон и призыв -->
        <div class="footer">
            <a href="tel:+79602389760" class="phone">
                +7 960 238-97-60
            </a>
            <span class="action-text">Звоните сейчас!</span>
        </div>

    </div>
</body>
</html>
